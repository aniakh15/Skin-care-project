
   <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع المنظف الذكي</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        h2 { color: #2c7a7b; }
        select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            font-size: 1rem;
        }
        button {
            background-color: #38b2ac;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2c7a7b; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e6fffa;
            color: #2c7a7b;
            font-weight: bold;
            min-height: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>منظف البشرة الذكي</h2>
    <p>اختر نوع بشرتك:</p>
    
    <select id="type">
        <option value="دهنية">بشرة دهنية</option>
        <option value="جافة">بشرة جافة</option>
        <option value="مختلطة">بشرة مختلطة</option>
    </select>

    <button onclick="show()">أعطني المنظف المناسب</button>

    <div id="result"></div>
</div>

<script>
function show() {
    // الحصول على القيمة من القائمة
    var t = document.getElementById("type").value;
    // مكان عرض النتيجة
    var r = document.getElementById("result");

    if (t === "دهنية") {
        r.innerText = "المنظف المقترح: جل رغوي بالزنك لتقليل الدهون.";
    } else if (t === "جافة") {
        r.innerText = "المنظف المقترح: حليب منظف مرطب غني بالزيوت.";
    } else {
        r.innerText = "المنظف المقترح: ماء ميسيلار أو منظف متوازن.";
    }
}
</script>

</body>
</html>
