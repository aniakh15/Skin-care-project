<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Skin Care ✨</title>
    <style>
        /* Modern Pink Aesthetic Design */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .pink-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid #ffffff;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { color: #d63384; font-size: 26px; margin-bottom: 10px; }
        p { color: #8a7a7d; margin-bottom: 30px; }

        select, button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 20px;
            border: 2px solid #fce4ec;
            font-size: 16px;
            outline: none;
        }

        button {
            background: linear-gradient(to right, #ff85a2, #ffadad);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.3);
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }

        /* Falling Petals Effect */
        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 20px;
            background: #fff9fa;
            color: #ad1457;
            display: none;
            border: 1px dashed #f8bbd0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="pink-card">
        <div class="icon">🌸</div>
        <h1>Pink AI Consultant</h1>
        <p>Discover the routine your skin loves..</p>
        
        <select id="skinType">
            <option value="" disabled selected>Select your skin type</option>
            <option value="oily">Oily Skin</option>
            <option value="dry">Dry Skin</option>
            <option value="mixed">Combination Skin</option>
        </select>

        <button onclick="reveal()">Discover Secret ✨</button>

        <div id="result"></div>
    </div>

    <script>
        function reveal() {
            const type = document.getElementById("skinType").value;
            const res = document.getElementById("result");
            if(!type) return;
            res.style.display = "block";
            
            if(type === "oily") res.innerText = "🌸 Recommendation: Use a refreshing foaming gel with Zinc to purify pores.";
            else if(type === "dry") res.innerText = "🌸 Recommendation: Use a velvety cleansing milk to nourish and hydrate.";
            else res.innerText = "🌸 Recommendation: Rose Micellar water is perfect for balancing your skin.";
        }// Falling Petals Logic
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 5000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
