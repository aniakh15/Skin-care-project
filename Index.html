<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمالكِ الوردي ✨</title>
    <style>
        /* تصميم الخلفية والأنيميشن */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* لمنع ظهور شريط التمرير بسبب الورد المتساقط */
        }

        .pink-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid #ffffff;
            z-index: 10; /* لتبقى البطاقة فوق الورد المتساقط */
        }

        .icon {
            font-size: 50px;
            display: inline-block;
            animation: heartbeat 2s infinite ease-in-out;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 { color: #d63384; font-weight: 300; margin-bottom: 10px; }

        select, button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 20px;
            border: 2px solid #fce4ec;
            font-size: 16px;
            outline: none;
        }

        button {
            background: linear-gradient(to right, #ff85a2, #ffadad);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 133, 162, 0.4); }

        /* تأثير بتلات الورد المتساقطة */
        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 20px;
            background: #fff9fa;
            color: #ad1457;
            display: none;
            border: 1px dashed #f8bbd0;
        }
    </style>
</head>
<body>

    <!-- البطاقة الرئيسية -->
    <div class="pink-card">
        <div class="icon">🌸</div>
        <h1>مستشاركِ الأنيق</h1>
        <p>اكتشفي الروتين الذي تعشقه بشرتكِ..</p>
        
        <select id="skinType">
            <option value="" disabled selected>ما هو نوع بشرتكِ الجميلة؟</option>
            <option value="دهنية">بشرة دهنية</option>
            <option value="جافة">بشرة جافة</option>
            <option value="مختلطة">بشرة مختلطة</option>
        </select>

        <button onclick="reveal()">اكتشفي السر ✨</button>

        <div id="result"></div>
    </div>

    <script>
        // وظيفة إظهار النتيجة
        function reveal() {
            const type = document.getElementById("skinType").value;
            const res = document.getElementById("result");
            if(!type) return;
            res.style.display = "block";
            
            if(type === "دهنية") res.innerText = "🌸 لجمالكِ: استخدمي جل رغوي منعش بالزنك.";
            else if(type === "جافة") res.innerText = "🌸 لجمالكِ: استخدمي حليب منظف مرطب ومخملي.";
            else res.innerText = "🌸 لجمالكِ: ماء ميسيلار ببتلات الورد هو الأنسب.";
        }
